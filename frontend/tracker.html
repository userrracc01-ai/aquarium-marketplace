<!DOCTYPE html>
<html>
<head>
 <meta charset="UTF-8">
 <title>Seller Tracker - FishBook</title>
 <link rel="stylesheet" href="/styles.css">
 <style>
 :root{
 --bg: #f6f8fa;
 --card: #ffffff;
 --surface: #fbfdff;
 --muted: #6b7280;
 --accent: #0ea5a4;
 --danger: #ef4444;
 --shadow: 0 8px 24px rgba(15,23,36,0.06);
 --radius: 12px;
 }
 *{box-sizing:border-box}
 body { background:var(--bg); color:#0f1724; margin:0; font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; -webkit-font-smoothing:antialiased; }
 /* Navbar */
 .navbar { position:sticky; top:0; z-index:1000; padding:12px 20px; background:var(--card); border-bottom:1px solid #eef4f6; box-shadow: 0 2px 8px rgba(15,23,36,0.04); }
 .navbar-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:12px; }
 .logo{ font-weight:700; color:#0b3b4a; font-size:20px; letter-spacing:0.2px }
 .nav-right{ display:flex; gap:12px; align-items:center }
 .user-profile{ background:transparent; padding:8px 12px; border-radius:999px; border:1px solid #eef2f7; color:var(--muted); font-weight:600 }
 .back-btn{ display:inline-block; background:var(--accent); color:#fff; border:none; padding:8px 12px; border-radius:999px; text-decoration:none; font-weight:700; box-shadow:0 6px 18px rgba(14,165,164,0.12) }
 .back-btn:hover{ filter:brightness(0.95) }
 /* Layout */
 .tracker-grid { max-width:1200px; margin:28px auto; padding:16px; display:grid; grid-template-columns: 1fr 380px; gap:24px; }
 @media (max-width:1000px){ .tracker-grid{ grid-template-columns: 1fr; padding:12px } }
 .card { background:var(--card); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); border:1px solid rgba(15,23,36,0.03); }
 .full-width{ grid-column:1 / -1 }
 h3{ margin:0 0 12px; font-size:18px; color:#0b3b4a }
 /* Business insights */
 .analytics-container { display:flex; gap:18px; margin-top:12px; }
 .stat-box { flex:1; background: linear-gradient(180deg, #ffffff, #fbfffe); border-radius:10px; padding:14px; border:1px solid #eef6f6; }
 .stat-box h4 { margin:0 0 6px; font-size:14px; color:var(--muted); font-weight:700 }
 .stat-box p { margin:0; font-size:18px; color: var(--accent); font-weight:800 }
 .stat-box h4 { display:flex; align-items:center; gap:8px }
 .stat-box .muted-note { font-size:12px; color:var(--muted); font-weight:600 }
 /* Add stock form */
 .add-stock-form{ display:flex; flex-direction:column; gap:12px; }
 .add-stock-form label{ font-size:13px; color:var(--muted); font-weight:600 }
 .add-stock-form input[type="text"], .add-stock-form input[type="number"], .add-stock-form textarea{ width:100%; padding:12px 14px; border-radius:8px; border:1px solid #eef2f7; background:var(--surface); font-size:14px; color:#0b1724 }
 .add-stock-form textarea{ min-height:100px; resize:vertical }
 .add-stock-form input[type="file"]{ margin-top:6px }
 .add-stock-form .submit-stock-btn{ width:100%; padding:12px 14px; border-radius:8px; border:none; background:var(--accent); color:white; font-weight:700; cursor:pointer; transition:transform .08s, box-shadow .12s }
 .add-stock-form .submit-stock-btn:hover{ transform:translateY(-1px); box-shadow:0 8px 28px rgba(14,165,164,0.12) }
 /* Listings */
 .listings-scroll{ display:flex; flex-direction:column; gap:12px; max-height:380px; overflow:auto; padding-right:6px }
 .item-row{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px; border-radius:10px; background:var(--card); border:1px solid #eef4f6 }
 .item-row .meta{ display:flex; align-items:center; gap:12px; flex:1 }
 .item-thumb{ width:56px; height:56px; border-radius:8px; object-fit:cover; flex-shrink:0; background:#f3f7f8; border:1px solid #eef6f6 }
 .open-listing{ cursor:pointer; color:#0b3b4a; font-weight:700; display:block }
 .open-listing small{ color:var(--muted); display:block; font-weight:600; font-size:13px }
 .listing-price{ color:var(--accent); font-weight:800; font-size:13px }
 .item-actions{ display:flex; gap:8px; align-items:center }
 .edit-btn{ background:transparent; border:1px solid rgba(14,165,164,0.14); color:var(--accent); padding:6px 10px; border-radius:8px; cursor:pointer; font-weight:700 }
 .edit-btn:hover{ background: rgba(14,165,164,0.06) }
 .delete-btn{ background:transparent; border:1px solid rgba(239,68,68,0.12); color:var(--danger); padding:6px 10px; border-radius:8px; cursor:pointer }
 .delete-btn:hover{ background: rgba(239,68,68,0.04) }
 /* Modal */
 .modal{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:1200 }
 .modal-overlay{ position:absolute; inset:0; background:rgba(2,6,23,0.45) }
 .modal-content{ position:relative; background:var(--card); padding:18px; border-radius:12px; width:92%; max-width:640px; box-shadow:0 28px 80px rgba(9,30,66,0.08); border:1px solid rgba(2,6,23,0.04) }
 .modal-close{ position:absolute; right:12px; top:12px; border:none; background:transparent; font-size:18px; cursor:pointer }
 input:focus, textarea:focus{ outline:none; border-color:var(--accent); box-shadow:0 8px 24px rgba(14,165,164,0.08) }
 @media (max-width:720px){ .item-row{ flex-direction:column; align-items:flex-start } }
 </style>
</head>
<body>
 <div class="navbar">
 <div class="navbar-inner">
 <div class="logo">FishBook Dashboard</div>
 <div class="nav-right">
 <!-- PROFILE_BAR_PLACEHOLDER -->
 </div>
 </div>
 </div>
 <div class="tracker-grid">
 
 <!-- 1. ANALYTICS & BOOKKEEPING BAR CARD -->
 <div class="card full-width">
 <h3>Business Insights</h3>
 <!-- Suggested Status Monitoring Bar -->
 <!-- STATUS_ALERT_PLACEHOLDER -->
 
 <div class="analytics-container">
 <div class="stat-box stat-profit">
 <h4>Total Profit Accumulation</h4>
 <p><!-- TOTAL_PROFIT_PLACEHOLDER --></p>
 </div>
 <div class="stat-box stat-inventory">
 <h4>Active Shop Stock Items</h4>
 <p><!-- TOTAL_ITEMS_PLACEHOLDER --></p>
 </div>
 </div>
 </div>
 <!-- 2. ADD OR SELL MORE FISH FORM CARD -->
 <div class="card">
 <h3>Add New Aquarium Stock</h3>
 <form class="add-stock-form" action="/add-fish" method="POST" enctype="multipart/form-data" onsubmit="attachSellerName(this)">
   <!-- Added new hidden input field to anchor creator username -->
   <input type="hidden" name="seller_username" id="form-seller-field">

    <label>Breed
 <input type="text" name="breed" placeholder="Fish Breed (e.g., Goldfish, Guppy, Betta)" required>
 </label>
 <label>Price (₱)
 <input type="number" name="price" placeholder="Price" step="0.01" required>
 </label>
 <label>Description
 <textarea name="description" placeholder="Describe the fish condition, size, color..." rows="4" required></textarea>
 </label>
 <label for="fishPhoto">Upload Live Specimen Image File:
 <input type="file" id="fishPhoto" name="fish_image" accept="image/*" required>
 </label>
 <!-- Hidden field so the server returns back to tracker seamlessly -->
 <input type="hidden" name="isTracker" value="true">
 <button type="submit" class="submit-stock-btn">List Fish for Sale</button>
 </form>
 </div>
 <!-- 3. ACTIVE FISH INVENTORY CARD -->
 <div class="card">
 <h3>Your Active Shop Listings</h3>
 <div class="listings-scroll">
 <!-- LISTINGS_PLACEHOLDER -->
 </div>
 </div>
 <!-- 4. ORDERED FISHES TRACKING FEED CARD -->
 <div class="card full-width">
 <h3>Incoming Customer Shipments</h3>
 <div class="orders-scroll">
 <!-- ORDERS_PLACEHOLDER -->
 </div>
 </div>
 </div>
 <!-- Processing execution forms framework -->
 <form id="hidden-delete-form" action="/delete-fish" method="POST" class="hidden">
 <input type="hidden" name="fishId" id="delete-fish-id">
 <input type="hidden" name="isTracker" value="true">
 </form>
 <!-- Unified listing modal and seller edit modal -->
 <div id="listing-modal" class="modal">
 <div class="modal-overlay" onclick="closeListingModal()"></div>
 <div class="modal-content">
 <button class="modal-close" onclick="closeListingModal()">×</button>
 <img id="modal-image" src="" alt="Listing image" class="modal-image">
 <h3 id="modal-breed" class="modal-breed"></h3>
 <p id="modal-price" class="modal-price"></p>
 <p id="modal-desc" class="modal-desc"></p>
 </div>
 </div>
 <!-- Edit modal for sellers (multipart form) -->
 <div id="edit-modal" class="modal">
 <div class="modal-overlay" onclick="closeEditModal()"></div>
 <div class="modal-content">
 <button class="modal-close" onclick="closeEditModal()">×</button>
 <form id="edit-form" action="/edit-fish" method="POST" enctype="multipart/form-data" class="add-stock-form">
 <input type="hidden" name="fishId" id="edit-fish-id">
 <label class="form-label">Breed
 <input type="text" name="breed" id="edit-breed" class="cart-confirm-input">
 </label>
 <label class="form-label">Price
 <input type="number" step="0.01" name="price" id="edit-price" class="cart-confirm-input">
 </label>
 <label class="form-label">Description
 <textarea name="description" id="edit-desc" rows="4" class="cart-confirm-input"></textarea>
 </label>
 <label class="form-label">Photo
 <input type="file" name="fish_image" id="edit-image" accept="image/*">
 </label>
 <input type="hidden" name="isTracker" value="true">
 <div class="modal-actions">
 <button type="submit" class="submit-stock-btn">Save Changes</button>
 <button type="button" class="btn-cancel" onclick="closeEditModal()">Cancel</button>
 </div>
 </form>
 </div>
 </div>
 
 <script>
 function deleteListing(id) {
 if (confirm('Are you sure you want to delete this listing?')) {
 document.getElementById('delete-fish-id').value = id;
 document.getElementById('hidden-delete-form').submit();
 }
 }
 function openEditModal(row) {
 const r = row || document.querySelector('[data-id]');
 const id = r.dataset.id || r.getAttribute('data-id');
 const breed = r.dataset.breed || r.getAttribute('data-breed') || '';
 const price = r.dataset.price || r.getAttribute('data-price') || '';
 const desc = r.dataset.desc || r.getAttribute('data-desc') || '';
 document.getElementById('edit-fish-id').value = id;
 document.getElementById('edit-breed').value = breed;
 document.getElementById('edit-price').value = price;
 document.getElementById('edit-desc').value = desc;
 document.getElementById('edit-modal').style.display = 'flex';
 }
 function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }
 function openListingModal(el) {
 let container = el && el.closest ? el.closest('.item-row') : null;
 if (!container && el && el.classList && el.classList.contains('item-row')) container = el;
 if (!container) container = el;
 const img = (container && container.dataset && container.dataset.image) ? container.dataset.image : '';
 const breed = (container && container.dataset && container.dataset.breed) ? container.dataset.breed : '';
 const price = (container && container.dataset && container.dataset.price) ? container.dataset.price : '';
 const desc = (container && container.dataset && container.dataset.desc) ? container.dataset.desc : '';
 document.getElementById('modal-image').src = img || '/uploads/placeholder.png';
 document.getElementById('modal-breed').innerText = breed;
 const p = Number(price);
 document.getElementById('modal-price').innerText = '₱' + (Number.isNaN(p) ? price : p.toLocaleString('en-US', {minimumFractionDigits:0}));
 document.getElementById('modal-desc').innerText = desc;
 document.getElementById('listing-modal').style.display = 'flex';
 }
 function closeListingModal() { document.getElementById('listing-modal').style.display = 'none'; }

 // New controller function to catch merchant profile strings before form transfer
 function attachSellerName(formElement) {
   const userSpan = document.getElementById('username-span');
   const sellerName = userSpan ? userSpan.innerText.replace('@', '').trim() : 'Official Merchant';
   document.getElementById('form-seller-field').value = sellerName;
 }
 </script>
 <script>
 (function enhanceListings(){
 const rows = document.querySelectorAll('.listings-scroll .item-row');
 rows.forEach(r => {
 if (!r.querySelector('.item-thumb')){
 const imgSrc = r.dataset.image || '/uploads/placeholder.png';
 const thumb = document.createElement('img');
 thumb.className = 'item-thumb';
 thumb.src = imgSrc || '/uploads/placeholder.png';
 r.insertBefore(thumb, r.firstChild);
 }
 const opener = r.querySelector('.open-listing');
 if (opener){
 opener.onclick = function(e){ e.stopPropagation(); openListingModal(r); };
 }
 const editBtn = r.querySelector('.edit-btn');
 if (editBtn){ editBtn.onclick = function(e){ e.stopPropagation(); openEditModal(r); }; }
 });
 })();
 const editInput = document.getElementById('edit-image');
 if (editInput){
 editInput.addEventListener('change', function(e){
 const input = e.target;
 const preview = document.getElementById('edit-preview');
 if (input.files && input.files[0]){
 const fr = new FileReader();
 fr.onload = function(ev){ preview.src = ev.target.result; preview.style.display = 'block'; };
 fr.readAsDataURL(input.files[0]);
 }
 });
 }
 (function wrapOpenEdit(){
 const orig = openEditModal;
 window.openEditModal = function(row){
 orig(row);
 const container = row && row.closest ? row.closest('.item-row') : row;
 const img = container && container.dataset && container.dataset.image ? container.dataset.image : '/uploads/placeholder.png';
 const preview = document.getElementById('edit-preview');
 if(preview){ preview.src = img; preview.style.display = 'block'; }
 };
 })();
 </script>
</body>
</html>
