<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FishBook - Portal</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        body { background-color: #f5f8fa; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; width: 100%; max-width: 400px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); text-align: center; }
        h2 { color: #1b4f72; margin-top: 0; margin-bottom: 25px; font-size: 26px; }
        input, select { width: 92%; padding: 12px; margin: 10px 0; border: 1px solid #ccd6dd; border-radius: 6px; font-size: 15px; outline: none; }
        input:focus, select:focus { border-color: #3498db; }
        button { background-color: #3498db; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 6px; width: 98%; margin-top: 15px; }
        button:hover { background-color: #2980b9; }
        hr { margin: 35px 0; border: 0; border-top: 1px solid #e1e8ed; }
        .back-link { display: block; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Create an Account</h2>
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Choose Username" required>
            <input type="password" name="password" placeholder="Choose Password" required>
            <select name="role" required>
                <option value="" disabled selected>Select Your Account Type</option>
                <option value="buyer">I want to Buy Fish (Buyer)</option>
                <option value="seller">I want to Sell Fish (Seller)</option>
            </select>
            <button type="submit">Sign Up</button>
        </form>

        <hr>

        <h2>Log In</h2>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-primary">Login</button>
        </form>
        
        <a href="/" class="back-link">← Back to Homepage</a>
    </div>

</body>
</html>
